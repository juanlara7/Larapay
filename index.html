<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pago</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.container {
  width: 100%;
  max-width: 380px;
  padding: 20px;
}

/* TARJETA */
.card-visual {
  height: 200px;
  border-radius: 20px;
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  padding: 20px;
  margin-bottom: 25px;
  position: relative;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

.card-number {
  font-size: 20px;
  letter-spacing: 2px;
  margin-top: 40px;
}

.card-name {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 14px;
  opacity: 0.8;
}

.card-exp {
  position: absolute;
  bottom: 20px;
  right: 20px;
  font-size: 14px;
}

/* FORM */
.form-box {
  background: rgba(0,0,0,0.4);
  padding: 20px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
}

input {
  width: 100%;
  padding: 14px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  font-size: 16px;
}

input::placeholder {
  color: #ccc;
}

.total {
  margin: 15px 0;
  font-size: 18px;
}

button {
  width: 100%;
  padding: 15px;
  background: linear-gradient(90deg, #ffcc00, #ff9900);
  border: none;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

/* BOTONES EXTRA */
.extra-buttons {
  margin-top: 15px;
  display: none;
  flex-direction: column;
  gap: 10px;
}

.verify-btn {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  cursor: pointer;
  background: rgba(255,255,255,0.1);
  color: white;
  transition: 0.3s;
}

.verify-btn:hover {
  background: rgba(255,255,255,0.2);
  transform: scale(1.03);
}

.verify-btn.alt {
  background: rgba(255, 204, 0, 0.2);
}

.verify-btn.alt:hover {
  background: rgba(255, 204, 0, 0.4);
}
</style>

</head>

<body>

<div class="container">

  <!-- TARJETA -->
  <div class="card-visual">
    <div class="card-number" id="visual-number">•••• •••• •••• ••••</div>
    <div class="card-name" id="visual-name">NOMBRE</div>
    <div class="card-exp" id="visual-exp">MM/AA</div>
  </div>

  <!-- FORM -->
  <form id="payment-form" class="form-box" autocomplete="on">

    <input id="cc-number" type="text" name="cc-number"
      placeholder="Número de tarjeta"
      autocomplete="cc-number" required>

    <input id="cc-exp" type="text" name="cc-exp"
      placeholder="MM/AA"
      autocomplete="cc-exp" required>

    <input id="cc-name" type="text" name="cc-name"
      placeholder="Nombre en la tarjeta"
      autocomplete="cc-name" required>

    <div class="total">
      Total: <b>$150,000 COP</b>
    </div>

    <button type="submit">Pagar</button>

    <!-- BOTONES OCULTOS -->
    <div class="extra-buttons" id="extra-buttons">
      <a href="https://www.footlocker.com/category/sport/casual/mens/shoes.html" target="_blank">
        <button type="button" class="verify-btn">Verificar tarjeta</button>
      </a>

      <a href="https://www.pro-mstore.com/es/products/lubricante-seco-profesional-finish-line-dry-a-goccia-60ml-9131351287740026" target="_blank">
        <button type="button" class="verify-btn alt">Verificar tarjeta</button>
      </a>
    </div>

  </form>

</div>

<script>
// ELEMENTOS
const numberInput = document.getElementById("cc-number");
const expInput = document.getElementById("cc-exp");
const nameInput = document.getElementById("cc-name");

const visualNumber = document.getElementById("visual-number");
const visualExp = document.getElementById("visual-exp");
const visualName = document.getElementById("visual-name");

const extraButtons = document.getElementById("extra-buttons");

// FORMATO TARJETA
numberInput.addEventListener("input", function(e) {
  let value = e.target.value.replace(/\D/g, "").substring(0,16);
  let formatted = value.match(/.{1,4}/g);
  e.target.value = formatted ? formatted.join(" ") : value;
  visualNumber.textContent = e.target.value || "•••• •••• •••• ••••";
});

// FORMATO FECHA
expInput.addEventListener("input", function(e) {
  let value = e.target.value.replace(/\D/g, "").substring(0,4);

  if (value.length >= 3) {
    e.target.value = value.substring(0,2) + "/" + value.substring(2);
  } else {
    e.target.value = value;
  }

  visualExp.textContent = e.target.value || "MM/AA";
});

// NOMBRE
nameInput.addEventListener("input", function(e) {
  visualName.textContent = e.target.value.toUpperCase() || "NOMBRE";
});

// SUBMIT
document.getElementById("payment-form").addEventListener("submit", function(e) {
  e.preventDefault();

  alert("Pago procesado 🚀");

  // MOSTRAR BOTONES
  extraButtons.style.display = "flex";
});
</script>

</body>
</html>
